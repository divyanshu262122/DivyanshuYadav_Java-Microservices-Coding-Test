# Order Management Service — Application Properties

server.port=8080

logging.level.root=WARN
logging.level.com.example.orders=INFO
logging.level.org.springframework.web=WARN
# Customize the logging pattern for console output
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [%t] %-40.40logger{39} : %m%n

spring.mvc.problemdetails.enabled=true
